<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AloClinica — Sem Conexão</title>
  <style>
    :root { --primary: #1a6fc4; --bg: #f8fafc; --fg: #1e293b; --muted: #64748b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container { text-align: center; max-width: 420px; padding: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .5rem; }
    p { font-size: .95rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .tips { text-align: left; background: white; border-radius: 1rem; padding: 1.25rem; margin-bottom: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .tips h2 { font-size: .85rem; font-weight: 700; margin-bottom: .75rem; }
    .tips ul { list-style: none; padding: 0; }
    .tips li { font-size: .85rem; color: var(--muted); padding: .4rem 0; padding-left: 1.5rem; position: relative; }
    .tips li::before { content: "✓"; position: absolute; left: 0; color: var(--primary); font-weight: bold; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--primary); color: white; border: none; border-radius: 999px;
      padding: .75rem 2rem; font-size: .9rem; font-weight: 700; cursor: pointer;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
    .status { font-size: .75rem; color: var(--muted); margin-top: 1rem; }
    .status.online { color: #16a34a; font-weight: 600; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --fg: #f1f5f9; --muted: #94a3b8; }
      .tips { background: #1e293b; }
    }
  </style>
</head>
<body>
  <main class="container" role="alert" aria-live="polite">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Sem conexão com a internet</h1>
    <p>Parece que você está offline. Verifique sua conexão e tente novamente.</p>
    <div class="tips" role="complementary" aria-label="Dicas de solução">
      <h2>O que você pode fazer:</h2>
      <ul>
        <li>Verifique seu Wi-Fi ou dados móveis</li>
        <li>Ative e desative o modo avião</li>
        <li>Reinicie seu roteador</li>
        <li>Tente novamente em alguns segundos</li>
      </ul>
    </div>
    <button class="btn" onclick="location.reload()" aria-label="Tentar reconectar">
      🔄 Tentar Novamente
    </button>
    <p class="status" id="connection-status">Verificando conexão...</p>
  </main>
  <script>
    const el = document.getElementById('connection-status');
    function check() {
      if (navigator.onLine) {
        el.textContent = '✅ Conexão restaurada! Recarregando...';
        el.className = 'status online';
        setTimeout(() => location.reload(), 800);
      } else {
        el.textContent = '⏳ Ainda sem conexão. Tentando reconectar...';
      }
    }
    window.addEventListener('online', check);
    setInterval(check, 5000);
    check();
  </script>
</body>
</html>
