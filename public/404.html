<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AloClínica</title>
  <script>
    // SPA redirect — preserva o path para o React Router
    var path = window.location.pathname + window.location.search;
    window.location.replace('/?redirect=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
