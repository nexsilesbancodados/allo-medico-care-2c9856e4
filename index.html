    <div id="root">

      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:hsl(210 33% 99%);flex-direction:column;gap:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

          <span style="width:7px;height:7px;border-radius:50%;background:hsl(210 90% 45%/.55);animation:ld-dot 1.2s ease-in-out .2s infinite"></span>
          <span style="width:7px;height:7px;border-radius:50%;background:hsl(210 90% 45%/.55);animation:ld-dot 1.2s ease-in-out .4s infinite"></span>
        </div>
        <span style="font-size:13px;color:hsl(210 15% 50%);font-weight:600;letter-spacing:.02em">Carregando AloClínica…</span>
        <style>@keyframes ld-bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.03)}}@keyframes ld-dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.15)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
    <script>
      (function () {
        var root = document.getElementById('root');
        var loader = document.getElementById('initial-loader');
        if (!root || !loader) return;

        var cleanedUp = false;
        var cleanup = function () {
          if (cleanedUp) return;
          cleanedUp = true;
          var current = document.getElementById('initial-loader');
          if (current) current.remove();
          if (observer) observer.disconnect();
          window.removeEventListener('app:mounted', cleanup);
        };

        var shouldCleanup = function () {
          return document.documentElement.getAttribute('data-app-mounted') === 'true'
            || document.body.getAttribute('data-app-mounted') === 'true'
            || root.children.length > 1
            || (root.firstElementChild && root.firstElementChild.id !== 'initial-loader');
        };

        var observer = new MutationObserver(function () {
          if (shouldCleanup()) cleanup();
        });

        observer.observe(root, { childList: true, subtree: false });
        window.addEventListener('app:mounted', cleanup);

        setTimeout(function () {
          if (shouldCleanup()) cleanup();
        }, 1200);

        setTimeout(cleanup, 8000);
      })();
    </script>
