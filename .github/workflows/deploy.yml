name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SUPABASE_PROJECT_REF: oaixgmuocuwhsabidpei

jobs:
  # ── Job 1: Build & Deploy Frontend (Docker → VPS) ──────────────────────────
  deploy-frontend:
    name: Frontend — Docker → VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.138.208
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Stop and remove old container
            docker stop aloclinica-web 2>/dev/null || true
            docker rm aloclinica-web 2>/dev/null || true

            # Start new container
            docker run -d \
              --name aloclinica-web \
              --restart unless-stopped \
              -p 3010:80 \
              ghcr.io/${{ github.repository }}:latest

            # Cleanup old images
            docker image prune -f

            # Verify deployment
            sleep 5
            curl -sf http://localhost:3010/health && echo "Deploy OK" || echo "Health check failed"

  # ── Job 2: Migrations + Edge Functions → Supabase ──────────────────────────
  deploy-supabase:
    name: Supabase — Migrations + Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB Migrations
        run: |
          supabase db push \
            --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy \
            --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Job 3: Notify result ─────────────────────────────────────────────────────
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-supabase]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (VPS) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase (Migrations + Functions) | ${{ needs.deploy-supabase.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
