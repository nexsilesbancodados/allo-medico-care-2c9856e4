name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: oaixgmuocuwhsabidpei

jobs:
  # ── Job 1: Build frontend + deploy diretamente no VPS ──────────────────────
  deploy-frontend:
    name: Frontend — Build + Deploy VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy dist + config to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 72.62.138.208
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "dist/,nginx.conf,Dockerfile.ci"
          target: "/opt/aloclinica/"
          strip_components: 0

      - name: Build Docker image on VPS and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.138.208
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/aloclinica

            # Build a fresh image locally on the VPS
            docker build -f Dockerfile.ci -t aloclinica-web:latest .

            # Stop and remove old container
            docker stop aloclinica-web 2>/dev/null || true
            docker rm aloclinica-web 2>/dev/null || true

            # Start new container
            docker run -d \
              --name aloclinica-web \
              --restart unless-stopped \
              -p 3010:80 \
              aloclinica-web:latest

            # Cleanup dangling images
            docker image prune -f

            # Health check
            sleep 5
            curl -sf http://localhost:3010/health && echo "✅ Deploy OK" || echo "⚠️ Health check failed"

  # ── Job 2: Supabase Migrations + Edge Functions ────────────────────────────
  deploy-supabase:
    name: Supabase — Migrations + Edge Functions
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB Migrations
        run: |
          supabase db push \
            --linked \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy \
            --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Job 3: Resultado ────────────────────────────────────────────────────────
  notify:
    name: Resultado do Deploy
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-supabase]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (VPS 72.62.138.208:3010) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase (Migrations + Functions)  | ${{ needs.deploy-supabase.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "By: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
